<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerging Market Price Simulator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14/dist/twemoji.min.js"></script>
    <style>
        :root { --pico-font-size: 15px; }
        body { padding: 0; }
        nav { padding: 0.5rem 1rem; }
        .container { max-width: 1200px; padding: 1rem; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge-ae { background: #f59e0b22; color: #f59e0b; border: 1px solid #f59e0b44; }
        .badge-sa { background: #10b98122; color: #10b981; border: 1px solid #10b98144; }
        .badge-au { background: #6366f122; color: #818cf8; border: 1px solid #6366f144; }
        .product-card { margin-bottom: 0.5rem; }
        .product-card article { margin-bottom: 0; padding: 1rem; }
        .product-grid { display: grid; grid-template-columns: 60px 1fr auto auto; gap: 1rem; align-items: center; }
        .product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #333; }
        .price { font-size: 1.1rem; font-weight: 700; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card article { margin-bottom: 0; text-align: center; padding: 1rem; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: 0.8rem; opacity: 0.7; }
        .actions { display: flex; gap: 0.5rem; }
        .actions a, .actions button { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
        #chart-container { position: relative; height: 300px; margin: 1rem 0; }
        .empty-state { text-align: center; padding: 3rem 1rem; opacity: 0.6; }
        .toast { position: fixed; bottom: 1rem; right: 1rem; padding: 0.75rem 1.25rem; border-radius: 8px; background: var(--pico-primary); color: #fff; z-index: 999; display: none; }
        .toast.show { display: block; }
        .toast.error { background: #ef4444; }
        form .grid { align-items: end; }
        img.emoji { height: 1.2em; width: 1.2em; margin: 0 0.05em 0 0.1em; vertical-align: -0.15em; }
        [data-theme="dark"] .nav-logo { filter: brightness(0) invert(1); }
        [data-theme="light"] .nav-logo { filter: none; }
    </style>
</head>
<body>
    <nav class="container">
        <ul>
            <li><strong><a href="/" style="display:flex;align-items:center;gap:0.5rem"><img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" alt="Amazon" class="nav-logo" style="height:22px"> Emerging Market Price Simulator</a></strong></li>
        </ul>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/docs" target="_blank">API Docs</a></li>
            <li><button id="theme-toggle" onclick="toggleTheme()" class="outline" style="padding:0.3rem 0.6rem;font-size:0.85rem">🌙</button></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <div id="toast" class="toast"></div>
    <script>
        function showToast(msg, isError) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => t.className = 'toast', 3000);
        }
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-toggle').textContent = next === 'dark' ? '🌙' : '☀️';
        }
        // Restore saved theme
        (function() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            const btn = document.getElementById('theme-toggle');
            if (btn) btn.textContent = saved === 'dark' ? '🌙' : '☀️';
        })();
    </script>
    {% block scripts %}{% endblock %}
    <script>
        // Parse emoji to Twemoji images after all content is rendered
        const _origLoadProducts = window.loadProducts;
        const _parseEmoji = () => { if(typeof twemoji !== 'undefined') twemoji.parse(document.body); };
        document.addEventListener('DOMContentLoaded', () => setTimeout(_parseEmoji, 500));
        // Re-parse after dynamic content updates
        const _origShowToast = window.showToast;
        if(_origShowToast) {
            window.showToast = function(msg, isError) { _origShowToast(msg, isError); _parseEmoji(); };
        }
    </script>
</body>
</html>
